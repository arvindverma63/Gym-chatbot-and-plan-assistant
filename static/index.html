<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FitPax AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="compact-card">
        <div class="header-row">
          <div>
            <p class="eyebrow">FitPax AI</p>
            <h1>Gym chatbot and plan assistant</h1>
          </div>
          <div class="status-pill"><span class="dot"></span> Auto-learning</div>
        </div>

        <p class="subtitle">
          Ask about workouts, meals, muscle gain, fat loss, or fill the quick profile to get a full plan.
        </p>

        <form id="profileForm" class="profile-grid">
          <label><span>Gender</span><select id="gender"><option value="">Loading...</option></select></label>
          <label><span>Goal</span><select id="goal"><option value="">Loading...</option></select></label>
          <label><span>Diet type (Food)</span><select id="dietType"><option value="">Loading...</option></select></label>
          <label><span>Medical History</span><input type="text" id="medicalHistory" placeholder="e.g. Asthma, none" /></label>
          
          <label><span>Weight (kg)</span><input type="number" step="0.1" id="weight" placeholder="e.g. 70" /></label>
          <label><span>Height (cm)</span><input type="number" step="1" id="height" placeholder="e.g. 175" /></label>
          <label><span>Chest (cm)</span><input type="number" step="0.1" id="chest" placeholder="e.g. 100" /></label>
          <label><span>Waist (cm)</span><input type="number" step="0.1" id="waist" placeholder="e.g. 80" /></label>
          <label><span>Hips (cm)</span><input type="number" step="0.1" id="hips" placeholder="e.g. 95" /></label>
          <label><span>Biceps (cm)</span><input type="number" step="0.1" id="biceps" placeholder="e.g. 35" /></label>
          <label><span>Body Fat (%)</span><input type="number" step="0.1" id="bodyFat" placeholder="e.g. 15" /></label>
          
          <!-- Hidden BMI dropdown since we will auto-calculate it, but kept for compatibility -->
          <select id="bmiCategory" style="display:none;"><option value="">Optional</option></select>
          
          <label class="wide">
            <span>Short description</span>
            <textarea id="description" rows="2" placeholder="Example: i am very skinny and i want build mussles"></textarea>
          </label>
        </form>

        <div class="chip-row">
          <button class="chip" data-fill="How many days should I train each week?">Weekly training</button>
          <button class="chip" data-fill="I am skinny and want to build muscles.">Gain muscle</button>
          <button class="chip" data-fill="How much cardio should I do to lose fat?">Lose fat</button>
          <button class="chip" data-fill="What should I eat for muscle gain?">Meal advice</button>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="messageInput"
            type="text"
            placeholder="Ask a question or describe your goal..."
            autocomplete="off"
          />
          <button type="submit" class="secondary">Ask</button>
          <button type="button" id="planBtn">Get plan</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
